<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section>
            <div class="game-box">
                <div class="info-row">
                    <div class="info-box">
                        <h3>Highest Score:
                            <span id="highestScore">0</span>
                        </h3>
                    </div>
                    <div class="info-box">
                        <h3>Score:
                            <span id="Score">0</span>
                        </h3>
                    </div>
                    <div class="info-box">
                        <h3>Time:
                            <span id="Time">00-00</span>
                        </h3>
                    </div>
                </div>
                <div class="board">
                   
                </div>
            </div>
        </section>
    </main>
    <div class="modal">
        <div class="start-game">
            <h2>Snake Game</h2>
            <p>Press start and use the arrow keys to play.</p>
            <button class="btn btn-start" type="button">Start Game</button>
        </div>
        <div class="Game-over">
            <h2>Game Over</h2>
            <div class="game-over-score">
                <p>Round Score: <span id="finalScore">0</span></p>
                </div>
                <div class="game-over-highestscore-box">
                    <p>Highest Score: <span id="finalHighestScore">0</span></p>
                </div>
                
            
            <p>Try again and beat your highest score.</p>
            <button class="btn btn-restart" type="button">Restart Game</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
